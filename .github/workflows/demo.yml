name: Agentic Workflow Demo

# runs on pushes and pull requests to main, showing two useful jobs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with flake8
        run: flake8 .
      - name: Run tests
        run: pytest -q

  issue-patch:
    name: Issue‑to‑Patch Demo
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Preview patch from issue
        run: python demos/feature_from_issue.py
      - name: Apply patch (creates backup)
        run: python demos/feature_from_issue.py --apply
      - name: Show resulting diff
        run: |
          git --no-pager diff app.py || true
